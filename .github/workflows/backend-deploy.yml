name: Build and Push Backend Docker Image

on:
  push:
    branches: ["main"]
    paths:
      - "server/**" # Only run when code inside the server directory changes

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server # Point directly to the server subfolder
          file: ./server/Dockerfile # Explicitly state where the Dockerfile is located
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/digital-life-lessons-server:latest